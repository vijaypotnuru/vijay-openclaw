<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Employee Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .status-done { background: #10b981; color: white; }
        .status-pending { background: #f59e0b; color: white; }
        .status-notstarted { background: #6b7280; color: white; }
        .status-error { background: #ef4444; color: white; }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .card:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.15); }
        .card { transition: all 0.2s ease; }
        .progress-bar { transition: width 0.5s ease; }
        input, select { outline: none; }
        input:focus, select:focus { ring: 2px; ring-color: #6366f1; }
    </style>
</head>
<body class="bg-gray-950 text-white min-h-screen">

    <!-- Header -->
    <div class="bg-gradient-to-r from-indigo-600 to-purple-600 py-6 px-4 shadow-xl">
        <div class="max-w-7xl mx-auto">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-3xl font-bold">🦞 OpenClaw Employee Tracker</h1>
                    <p class="text-indigo-200 mt-1">Real-time deployment status for all employee laptops</p>
                </div>
                <div class="flex gap-3">
                    <button onclick="addEmployee()" class="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-lg font-medium transition">+ Add Employee</button>
                    <button onclick="exportData()" class="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-lg font-medium transition">📥 Export</button>
                </div>
            </div>
            <!-- Stats -->
            <div class="grid grid-cols-4 gap-4 mt-6" id="stats">
                <!-- Filled by JS -->
            </div>
        </div>
    </div>

    <!-- Filters -->
    <div class="max-w-7xl mx-auto px-4 py-4 flex gap-3 items-center">
        <input type="text" id="searchInput" placeholder="🔍 Search employees..." class="bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 w-64 focus:border-indigo-500" oninput="renderEmployees()">
        <select id="filterStatus" class="bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 focus:border-indigo-500" onchange="renderEmployees()">
            <option value="all">All Status</option>
            <option value="complete">✅ Complete</option>
            <option value="inprogress">⏳ In Progress</option>
            <option value="notstarted">⬜ Not Started</option>
        </select>
    </div>

    <!-- Employee Grid -->
    <div class="max-w-7xl mx-auto px-4 pb-8">
        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4" id="employeeGrid">
            <!-- Filled by JS -->
        </div>
    </div>

    <!-- Add Employee Modal -->
    <div id="modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">
        <div class="bg-gray-900 rounded-2xl p-6 w-full max-w-md border border-gray-700">
            <h2 class="text-xl font-bold mb-4" id="modalTitle">Add Employee</h2>
            <div class="space-y-3">
                <div>
                    <label class="text-sm text-gray-400">Name</label>
                    <input type="text" id="empName" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 mt-1">
                </div>
                <div>
                    <label class="text-sm text-gray-400">Laptop Name</label>
                    <input type="text" id="empLaptop" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 mt-1" placeholder="e.g. LAPTOP-ABC123">
                </div>
                <div>
                    <label class="text-sm text-gray-400">Windows Username</label>
                    <input type="text" id="empWinUser" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 mt-1">
                </div>
                <div>
                    <label class="text-sm text-gray-400">Linux Username</label>
                    <input type="text" id="empLinuxUser" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 mt-1">
                </div>
                <div>
                    <label class="text-sm text-gray-400">Tailscale IP</label>
                    <input type="text" id="empIP" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 mt-1" placeholder="100.x.x.x">
                </div>
                <div>
                    <label class="text-sm text-gray-400">Telegram Bot Username</label>
                    <input type="text" id="empBot" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 mt-1" placeholder="@username_bot">
                </div>
                <div>
                    <label class="text-sm text-gray-400">Telegram Bot Token</label>
                    <input type="text" id="empToken" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 mt-1">
                </div>
                <div>
                    <label class="text-sm text-gray-400">Laptop Hardware</label>
                    <input type="text" id="empHardware" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 mt-1" placeholder="e.g. ASUS TUF A15, Ryzen 7, RTX 3050, 16GB">
                </div>
            </div>
            <div class="flex gap-3 mt-5">
                <button onclick="saveEmployee()" class="flex-1 bg-indigo-600 hover:bg-indigo-700 py-2 rounded-lg font-medium transition">Save</button>
                <button onclick="closeModal()" class="flex-1 bg-gray-700 hover:bg-gray-600 py-2 rounded-lg font-medium transition">Cancel</button>
            </div>
        </div>
    </div>

<script>
// Checklist items
const CHECKLIST = [
    { id: 'zip', label: 'Download & Extract ZIP', icon: '📦' },
    { id: 'setup', label: 'Run setup.bat (Admin)', icon: '🖥️' },
    { id: 'restart', label: 'Restart + Re-run (if needed)', icon: '🔄' },
    { id: 'postsetup', label: 'Run postsetup.sh (Ubuntu)', icon: '🐧' },
    { id: 'password', label: 'Set Employee Password', icon: '🔑' },
    { id: 'tailscale', label: 'Install Tailscale + Login', icon: '🌐' },
    { id: 'ssh', label: 'SSH Keys (Ubuntu + PowerShell)', icon: '🔐' },
    { id: 'ollama', label: 'Ollama Account (employee own)', icon: '🤖' },
    { id: 'telegram', label: 'Telegram Bot Connected', icon: '📱' },
    { id: 'verify', label: 'Verify AI Responds', icon: '✅' }
];

// Default employee data
const DEFAULT_EMPLOYEES = [
    {
        name: 'Shiva Kumar',
        laptop: 'LAPTOP-THETEFCG',
        winUser: 'shiva kumar vakiti',
        linuxUser: 'shiva_kumar_vakiti',
        ip: '100.117.69.13',
        bot: '@shiva_vakiti_openclaw_bot',
        token: '8645149950:AAE5aLKFWk7eyhYFNsp1VLZd-E24PI081y4',
        hardware: 'Unknown',
        checks: { zip: true, setup: true, restart: true, postsetup: true, password: true, tailscale: true, ssh: true, ollama: false, telegram: true, verify: false },
        notes: 'Needs own Ollama account'
    },
    {
        name: 'Hari Challa',
        laptop: 'HARI',
        winUser: 'haric',
        linuxUser: 'haric',
        ip: '100.102.233.75',
        bot: '@hari_challa_openclaw_bot',
        token: '8727161888:AAHrRhPkZm3WgWPJ7qejtsVkNBj7_ntVDKw',
        hardware: 'ASUS TUF Gaming A15, Ryzen 7 7435HS, RTX 3050 4GB, 16GB RAM, 1TB',
        checks: { zip: true, setup: true, restart: true, postsetup: true, password: false, tailscale: true, ssh: true, ollama: false, telegram: true, verify: false },
        notes: 'WSL sudo disabled - needs Developer Settings. Needs password + Ollama account'
    }
];

let employees = JSON.parse(localStorage.getItem('openclaw_employees') || 'null') || DEFAULT_EMPLOYEES;
let editingIndex = -1;

function save() {
    localStorage.setItem('openclaw_employees', JSON.stringify(employees));
}

function getProgress(emp) {
    const done = Object.values(emp.checks).filter(Boolean).length;
    return { done, total: CHECKLIST.length, pct: Math.round((done / CHECKLIST.length) * 100) };
}

function getStatus(emp) {
    const p = getProgress(emp);
    if (p.pct === 100) return 'complete';
    if (p.pct > 0) return 'inprogress';
    return 'notstarted';
}

function renderStats() {
    const total = employees.length;
    const complete = employees.filter(e => getStatus(e) === 'complete').length;
    const inprogress = employees.filter(e => getStatus(e) === 'inprogress').length;
    const notstarted = employees.filter(e => getStatus(e) === 'notstarted').length;
    document.getElementById('stats').innerHTML = `
        <div class="bg-white/10 rounded-xl p-4 text-center">
            <div class="text-3xl font-bold">${total}</div>
            <div class="text-sm text-indigo-200">Total</div>
        </div>
        <div class="bg-emerald-500/20 rounded-xl p-4 text-center">
            <div class="text-3xl font-bold text-emerald-400">${complete}</div>
            <div class="text-sm text-emerald-200">Complete</div>
        </div>
        <div class="bg-amber-500/20 rounded-xl p-4 text-center">
            <div class="text-3xl font-bold text-amber-400">${inprogress}</div>
            <div class="text-sm text-amber-200">In Progress</div>
        </div>
        <div class="bg-gray-500/20 rounded-xl p-4 text-center">
            <div class="text-3xl font-bold text-gray-400">${notstarted}</div>
            <div class="text-sm text-gray-300">Not Started</div>
        </div>
    `;
}

function renderEmployees() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const filter = document.getElementById('filterStatus').value;
    
    let filtered = employees.filter((emp, i) => {
        const matchSearch = !search || emp.name.toLowerCase().includes(search) || emp.laptop.toLowerCase().includes(search) || emp.ip.includes(search);
        const matchFilter = filter === 'all' || getStatus(emp) === filter;
        return matchSearch && matchFilter;
    });

    const grid = document.getElementById('employeeGrid');
    grid.innerHTML = filtered.map((emp, fi) => {
        const i = employees.indexOf(emp);
        const p = getProgress(emp);
        const status = getStatus(emp);
        const statusLabel = status === 'complete' ? '✅ Complete' : status === 'inprogress' ? '⏳ In Progress' : '⬜ Not Started';
        const statusClass = status === 'complete' ? 'bg-emerald-500/20 text-emerald-400' : status === 'inprogress' ? 'bg-amber-500/20 text-amber-400' : 'bg-gray-500/20 text-gray-400';

        return `
        <div class="card bg-gray-900 border border-gray-800 rounded-2xl p-5">
            <div class="flex justify-between items-start mb-3">
                <div>
                    <h3 class="text-lg font-bold">${emp.name}</h3>
                    <p class="text-sm text-gray-400">${emp.laptop}</p>
                </div>
                <span class="text-xs px-2 py-1 rounded-full ${statusClass}">${statusLabel}</span>
            </div>
            
            <!-- Info -->
            <div class="grid grid-cols-2 gap-2 text-sm mb-3">
                <div class="text-gray-400">IP:</div><div>${emp.ip || '—'}</div>
                <div class="text-gray-400">Bot:</div><div class="truncate">${emp.bot || '—'}</div>
                <div class="text-gray-400">Win:</div><div class="truncate">${emp.winUser || '—'}</div>
                <div class="text-gray-400">Linux:</div><div>${emp.linuxUser || '—'}</div>
            </div>
            
            ${emp.hardware ? `<div class="text-xs text-gray-500 mb-3">💻 ${emp.hardware}</div>` : ''}
            
            <!-- Progress Bar -->
            <div class="mb-3">
                <div class="flex justify-between text-xs mb-1">
                    <span>Progress</span>
                    <span>${p.done}/${p.total} (${p.pct}%)</span>
                </div>
                <div class="bg-gray-800 rounded-full h-2">
                    <div class="progress-bar h-2 rounded-full ${p.pct === 100 ? 'bg-emerald-500' : 'bg-indigo-500'}" style="width: ${p.pct}%"></div>
                </div>
            </div>
            
            <!-- Checklist -->
            <div class="space-y-1 mb-3">
                ${CHECKLIST.map(c => `
                    <label class="flex items-center gap-2 text-sm cursor-pointer hover:bg-gray-800 rounded px-1 py-0.5">
                        <input type="checkbox" ${emp.checks[c.id] ? 'checked' : ''} onchange="toggleCheck(${i}, '${c.id}')" class="accent-indigo-500">
                        <span class="${emp.checks[c.id] ? 'text-gray-300' : 'text-gray-500'}">${c.icon} ${c.label}</span>
                    </label>
                `).join('')}
            </div>
            
            ${emp.notes ? `<div class="text-xs text-amber-400 bg-amber-500/10 rounded-lg px-3 py-2 mb-3">⚠️ ${emp.notes}</div>` : ''}
            
            <!-- Actions -->
            <div class="flex gap-2">
                <button onclick="editEmployee(${i})" class="flex-1 bg-gray-800 hover:bg-gray-700 text-sm py-1.5 rounded-lg transition">✏️ Edit</button>
                <button onclick="deleteEmployee(${i})" class="bg-red-900/50 hover:bg-red-900 text-sm py-1.5 px-3 rounded-lg transition">🗑️</button>
            </div>
        </div>
        `;
    }).join('');
    
    renderStats();
}

function toggleCheck(i, id) {
    employees[i].checks[id] = !employees[i].checks[id];
    save();
    renderEmployees();
}

function addEmployee() {
    editingIndex = -1;
    document.getElementById('modalTitle').textContent = 'Add Employee';
    document.getElementById('empName').value = '';
    document.getElementById('empLaptop').value = '';
    document.getElementById('empWinUser').value = '';
    document.getElementById('empLinuxUser').value = '';
    document.getElementById('empIP').value = '';
    document.getElementById('empBot').value = '';
    document.getElementById('empToken').value = '';
    document.getElementById('empHardware').value = '';
    document.getElementById('modal').classList.remove('hidden');
}

function editEmployee(i) {
    editingIndex = i;
    const emp = employees[i];
    document.getElementById('modalTitle').textContent = 'Edit Employee';
    document.getElementById('empName').value = emp.name;
    document.getElementById('empLaptop').value = emp.laptop;
    document.getElementById('empWinUser').value = emp.winUser;
    document.getElementById('empLinuxUser').value = emp.linuxUser;
    document.getElementById('empIP').value = emp.ip;
    document.getElementById('empBot').value = emp.bot;
    document.getElementById('empToken').value = emp.token;
    document.getElementById('empHardware').value = emp.hardware;
    document.getElementById('modal').classList.remove('hidden');
}

function saveEmployee() {
    const emp = {
        name: document.getElementById('empName').value || 'Unknown',
        laptop: document.getElementById('empLaptop').value || '',
        winUser: document.getElementById('empWinUser').value || '',
        linuxUser: document.getElementById('empLinuxUser').value || '',
        ip: document.getElementById('empIP').value || '',
        bot: document.getElementById('empBot').value || '',
        token: document.getElementById('empToken').value || '',
        hardware: document.getElementById('empHardware').value || '',
        checks: editingIndex >= 0 ? employees[editingIndex].checks : Object.fromEntries(CHECKLIST.map(c => [c.id, false])),
        notes: editingIndex >= 0 ? employees[editingIndex].notes : ''
    };
    
    if (editingIndex >= 0) {
        employees[editingIndex] = emp;
    } else {
        employees.push(emp);
    }
    save();
    closeModal();
    renderEmployees();
}

function deleteEmployee(i) {
    if (confirm(`Delete ${employees[i].name}?`)) {
        employees.splice(i, 1);
        save();
        renderEmployees();
    }
}

function closeModal() {
    document.getElementById('modal').classList.add('hidden');
}

function exportData() {
    const blob = new Blob([JSON.stringify(employees, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'openclaw-employees.json';
    a.click();
}

// Init
renderEmployees();
</script>
</body>
</html>
